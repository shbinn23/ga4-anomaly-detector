services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ga4-anomaly-api:latest
    container_name: ga4-api
    ports:
      - "8000:8000"
    volumes:
      - ga4_data:/app/data
    env_file: .env
    restart: unless-stopped
    # e2-micro 1GB 제약: API + Prophet 런타임용 메모리 확보
    mem_limit: 700m
    memswap_limit: 700m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: ga4-anomaly-dashboard:latest
    container_name: ga4-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ga4_data:/app/data
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ga4-anomaly-frontend:latest
    container_name: ga4-frontend
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: ga4-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/files/workflows:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ga4_data:
    driver: local
  n8n_data:
    driver: local
