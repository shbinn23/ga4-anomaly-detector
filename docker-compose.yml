services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ga4-anomaly-api:latest
    container_name: ga4-api
    ports:
      - "8000:8000"
    volumes:
      - ga4_data:/app/data
    env_file: .env
    restart: unless-stopped
    # e2-micro 1GB 제약: API + Prophet 런타임용 메모리 확보
    mem_limit: 700m
    memswap_limit: 700m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: ga4-anomaly-dashboard:latest
    container_name: ga4-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ga4_data:/app/data
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m

volumes:
  ga4_data:
    driver: local
